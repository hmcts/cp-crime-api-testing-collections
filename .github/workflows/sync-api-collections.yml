name: Sync API Collections

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly — Monday 08:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install git-crypt
        run: sudo apt-get install -y git-crypt

      - name: Decrypt credentials
        run: echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d | git-crypt unlock -

      - name: Check and sync collections
        run: node scripts/sync-collections.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --exit-code; then
            echo "No spec changes detected."
          else
            git commit -m "Auto-sync: update collections to latest SwaggerHub specs"
            git push origin main
          fi